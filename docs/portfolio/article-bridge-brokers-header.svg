<svg viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg" width="1200" height="627" role="img" aria-labelledby="header-title header-desc">
  <title id="header-title">Three industries, three brokers, one pattern</title>
  <desc id="header-desc">A side-by-side comparison of the bridge-at-the-boundary pattern across Aireon (ADS-B to Kafka), Northstrat (ActiveMQ to Kafka), and Grid Sensor Pipeline (MQTT to Kinesis). External protocol on the left, bridge layer highlighted in rust in the middle, internal stream in navy on the right.</desc>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3a3a36"/>
    </marker>
  </defs>

  <rect width="1200" height="627" fill="#ede9e1"/>

  <text x="80" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="400" fill="#0e0e0e">Three industries. Three brokers. One pattern.</text>
  <text x="80" y="128" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" letter-spacing="3" fill="#565650">EXTERNAL PROTOCOL  →  BRIDGE LAYER  →  INTERNAL STREAM</text>

  <line x1="80" y1="160" x2="1120" y2="160" stroke="#0e0e0e" stroke-opacity="0.15" stroke-width="1"/>

  <text x="380" y="195" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" letter-spacing="2" fill="#565650">EXTERNAL (PARTNER-CONSTRAINED)</text>
  <text x="640" y="195" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" letter-spacing="2" fill="#c9501e" font-weight="700">BRIDGE (TRANSLATION OWNS THIS LINE)</text>
  <text x="900" y="195" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" letter-spacing="2" fill="#565650">INTERNAL (YOURS TO DESIGN)</text>

  <!-- ROW 1: AIREON -->
  <text x="80" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="3" fill="#565650">AIREON</text>
  <text x="80" y="266" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#0e0e0e">Aviation telemetry</text>
  <rect x="290" y="228" width="180" height="60" fill="#ffffff" stroke="#0e0e0e" stroke-width="1.5" rx="3"/>
  <text x="380" y="256" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#0e0e0e">ADS-B / RF</text>
  <text x="380" y="274" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#565650">broadcast protocol</text>
  <line x1="480" y1="258" x2="540" y2="258" stroke="#3a3a36" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="550" y="228" width="180" height="60" fill="#c9501e" rx="3"/>
  <text x="640" y="256" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#f7f4ef">RF Receiver</text>
  <text x="640" y="274" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#f7f4ef" opacity="0.85">decode + dedup upstream</text>
  <line x1="740" y1="258" x2="800" y2="258" stroke="#3a3a36" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="810" y="228" width="180" height="60" fill="#153f70" rx="3"/>
  <text x="900" y="263" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#f7f4ef">Kafka</text>

  <!-- ROW 2: NORTHSTRAT -->
  <text x="80" y="350" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="3" fill="#565650">NORTHSTRAT</text>
  <text x="80" y="376" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#0e0e0e">Satellite comms</text>
  <rect x="290" y="338" width="180" height="60" fill="#ffffff" stroke="#0e0e0e" stroke-width="1.5" rx="3"/>
  <text x="380" y="366" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#0e0e0e">ActiveMQ / JMS</text>
  <text x="380" y="384" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#565650">enterprise queue</text>
  <line x1="480" y1="368" x2="540" y2="368" stroke="#3a3a36" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="550" y="338" width="180" height="60" fill="#c9501e" rx="3"/>
  <text x="640" y="366" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#f7f4ef">Spring Boot Adapter</text>
  <text x="640" y="384" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#f7f4ef" opacity="0.85">JMS &#8594; Kafka producer</text>
  <line x1="740" y1="368" x2="800" y2="368" stroke="#3a3a36" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="810" y="338" width="180" height="60" fill="#153f70" rx="3"/>
  <text x="900" y="373" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#f7f4ef">Kafka</text>

  <!-- ROW 3: GRID SENSOR -->
  <text x="80" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="3" fill="#565650">GRID SENSOR &#8226; PORTFOLIO POC</text>
  <text x="80" y="486" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#0e0e0e">IoT pipeline</text>
  <rect x="290" y="448" width="180" height="60" fill="#ffffff" stroke="#0e0e0e" stroke-width="1.5" rx="3"/>
  <text x="380" y="476" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#0e0e0e">MQTT</text>
  <text x="380" y="494" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#565650">device pub/sub</text>
  <line x1="480" y1="478" x2="540" y2="478" stroke="#3a3a36" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="550" y="448" width="180" height="60" fill="#c9501e" rx="3"/>
  <text x="640" y="476" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#f7f4ef">IoT Core + Rules</text>
  <text x="640" y="494" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#f7f4ef" opacity="0.85">SQL filter + dispatch</text>
  <line x1="740" y1="478" x2="800" y2="478" stroke="#3a3a36" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="810" y="448" width="180" height="60" fill="#153f70" rx="3"/>
  <text x="900" y="483" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#f7f4ef">Kinesis</text>

  <line x1="80" y1="555" x2="1120" y2="555" stroke="#0e0e0e" stroke-opacity="0.15" stroke-width="1"/>
  <text x="600" y="595" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" fill="#c9501e">&#8220;Translation lives at the boundary.&#8221;</text>
</svg>
